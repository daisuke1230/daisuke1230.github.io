<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#bfd1d7">
    <meta
      name="description"
      content="嗨，我是大助喵，異色瞳、虎斑花紋的緬因貓、攝影師。喜歡攝影、布丁，最近開始接觸動態攝影～"
    >
    <meta property="og:title" content="daisukemeow">
    <meta
      property="og:description"
      content="嗨，我是大助喵，異色瞳、虎斑花紋的緬因貓、攝影師。喜歡攝影、布丁，最近開始接觸動態攝影～"
    >
    <meta property="og:type" content="website">
    <meta property="og:image" content="daisukemeow_head.png">
    <title>daisukemeow</title>
    <link rel="icon" href="daisukemeow_head.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="portal" aria-label="daisukemeow social links">
      <nav class="top-actions" aria-label="Page actions">
        <button class="icon-button" type="button" data-share aria-label="Share this page">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path d="M12 3v11m0-11 4 4m-4-4-4 4"></path>
            <path d="M5 11v8h14v-8"></path>
          </svg>
        </button>
      </nav>

      <section class="profile" aria-labelledby="profile-name">
        <img class="avatar" src="daisukemeow_head.png" alt="daisukemeow avatar">
        <h1 id="profile-name">daisukemeow</h1>
        <p>
          嗨，我是大助喵，異色瞳、虎斑花紋的緬因貓、攝影師。<br>
          喜歡攝影、布丁，最近開始接觸動態攝影～
        </p>
      </section>

      <section class="links" aria-label="Social media links">
        <article class="link-card">
          <a class="link-main" href="https://www.twitch.tv/daisukemeowmeow">
            <img src="logo/Twitch.png" alt="" aria-hidden="true">
            <span>Twitch</span>
          </a>
          <button class="more" type="button" data-link-share data-title="Twitch" data-url="https://www.twitch.tv/daisukemeowmeow" aria-label="Share Twitch link">⋮</button>
        </article>
        <article class="link-card">
          <a class="link-main" href="https://www.facebook.com/daisukemeow">
            <img src="logo/FB.png" alt="" aria-hidden="true">
            <span>Facebook</span>
          </a>
          <button class="more" type="button" data-link-share data-title="Facebook" data-url="https://www.facebook.com/daisukemeow" aria-label="Share Facebook link">⋮</button>
        </article>
        <article class="link-card">
          <a class="link-main" href="https://www.plurk.com/daisukemeow">
            <img class="plurk-logo" src="logo/plurk-80.png" alt="" aria-hidden="true">
            <span>Plurk</span>
          </a>
          <button class="more" type="button" data-link-share data-title="Plurk" data-url="https://www.plurk.com/daisukemeow" aria-label="Share Plurk link">⋮</button>
        </article>
        <article class="link-card">
          <a class="link-main" href="https://x.com/daisukechen_tw">
            <img src="logo/X.png" alt="" aria-hidden="true">
            <span>X</span>
          </a>
          <button class="more" type="button" data-link-share data-title="X" data-url="https://x.com/daisukechen_tw" aria-label="Share X link">⋮</button>
        </article>
        <article class="link-card">
          <a class="link-main" href="https://www.youtube.com/@daisukemeowmeow">
            <img src="logo/Youtube.png" alt="" aria-hidden="true">
            <span>YouTube</span>
          </a>
          <button class="more" type="button" data-link-share data-title="YouTube" data-url="https://www.youtube.com/@daisukemeowmeow" aria-label="Share YouTube link">⋮</button>
        </article>
      </section>
    </main>

    <div class="share-dialog" data-dialog hidden>
      <div class="share-dialog__backdrop" data-close-dialog></div>
      <section class="share-dialog__panel" role="dialog" aria-modal="true" aria-labelledby="share-title">
        <header class="share-dialog__header">
          <h2 id="share-title">分享連結</h2>
          <button class="share-dialog__close" type="button" data-close-dialog aria-label="Close share dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18"></path>
            </svg>
          </button>
        </header>
        <p class="share-dialog__name" data-dialog-title></p>
        <p class="share-dialog__url" data-dialog-url></p>
        <button class="share-dialog__copy" type="button" data-copy-link>複製連結</button>
        <p class="share-dialog__status" data-copy-status aria-live="polite"></p>
      </section>
    </div>

    <script>
      const shareButton = document.querySelector("[data-share]");
      const shareDialog = document.querySelector("[data-dialog]");
      const dialogTitle = document.querySelector("[data-dialog-title]");
      const dialogUrl = document.querySelector("[data-dialog-url]");
      const copyLinkButton = document.querySelector("[data-copy-link]");
      const copyStatus = document.querySelector("[data-copy-status]");
      let activeShareUrl = "";
      let lastFocusedElement = null;

      const showShareMessage = (message) => {
        shareButton.dataset.message = message;
        shareButton.setAttribute("aria-label", message);
        window.clearTimeout(shareButton.resetTimer);
        shareButton.resetTimer = window.setTimeout(() => {
          shareButton.removeAttribute("data-message");
          shareButton.setAttribute("aria-label", "Share this page");
        }, 1800);
      };

      const copyText = async (text) => {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const input = document.createElement("textarea");
        input.value = text;
        input.setAttribute("readonly", "");
        input.style.position = "fixed";
        input.style.top = "-999px";
        document.body.append(input);
        input.select();
        const copied = document.execCommand("copy");
        input.remove();

        if (!copied) {
          throw new Error("Copy command failed");
        }
      };

      const copyCurrentUrl = () => copyText(window.location.href);

      const openShareDialog = (title, url) => {
        activeShareUrl = url;
        lastFocusedElement = document.activeElement;
        dialogTitle.textContent = title;
        dialogUrl.textContent = url;
        copyStatus.textContent = "";
        shareDialog.hidden = false;
        document.body.classList.add("dialog-open");
        copyLinkButton.focus();
      };

      const closeShareDialog = () => {
        shareDialog.hidden = true;
        document.body.classList.remove("dialog-open");
        activeShareUrl = "";
        lastFocusedElement?.focus();
      };

      shareButton.addEventListener("click", async () => {
        const shareData = {
          title: document.title,
          text: "daisukemeow social links",
          url: window.location.href
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
            return;
          }
        } catch (error) {
          if (error.name === "AbortError") {
            return;
          }
        }

        try {
          await copyCurrentUrl();
          showShareMessage("已複製連結");
        } catch (error) {
          showShareMessage("請手動複製網址");
        }
      });

      document.querySelectorAll("[data-link-share]").forEach((button) => {
        button.addEventListener("click", () => {
          openShareDialog(button.dataset.title, button.dataset.url);
        });
      });

      copyLinkButton.addEventListener("click", async () => {
        try {
          await copyText(activeShareUrl);
          copyStatus.textContent = "已複製連結";
        } catch (error) {
          copyStatus.textContent = "請手動複製上方網址";
        }
      });

      document.querySelectorAll("[data-close-dialog]").forEach((button) => {
        button.addEventListener("click", closeShareDialog);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !shareDialog.hidden) {
          closeShareDialog();
        }
      });
    </script>
  </body>
</html>
